name: Build
on: [ push, pull_request ]
jobs:

  build:
    name: Gradle Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          # We specifically need Java 17 as it's the only one which supports every Gradle version we build/test with (7, 8, and 9).
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      # On push to main - build and publish
      - name: Build and deploy with Gradle
        if: github.ref == 'refs/heads/main'
        run: ./gradlew build publishAll --no-daemon --info --stacktrace
        env:
          # Sign artifacts
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
          # Authenticate to Maven Central via JReleaser
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          # GitHub token for JReleaser to create releases
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Authenticate to GPP
          GRADLE_PUBLISH_KEY: ${{ secrets.GPP_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GPP_SECRET }}
      
      # On PR, or push to non-main branch - build only, don't publish
      - name: Build with Gradle
        if: github.ref != 'refs/heads/main'
        run: ./gradlew build --no-daemon --info --stacktrace

      - name: Build Gradle War Sample
        working-directory: ./samples/gradle-war-sample
        run: ./gradlew build -PcicsUser=user -PcicsPass=pass --no-daemon --info --stacktrace --include-build ../..

      - name: Build Gradle Multipart Sample
        working-directory: ./samples/gradle-multipart-sample
        run: ./gradlew build -PcicsUser=user -PcicsPass=pass --no-daemon --info --stacktrace --include-build ../..